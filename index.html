<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CleanChain 2026 TFBO 活動表單</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 15px; background-color: #f4f6f9; color: #333; line-height: 1.6; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #004d99; margin-bottom: 20px; font-size: 22px;}
    .form-group { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 15px;}
    input[type="text"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
    .radio-group label, .checkbox-group label { font-weight: normal; display: flex; align-items: center; font-size: 15px; cursor: pointer; }
    input[type="radio"], input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
    .other-input { margin-top: 5px; padding: 8px; width: 90%; border: 1px dashed #aaa; border-radius: 4px; }
    .footer-note { font-size: 12px; color: #888; text-align: justify; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    button { background-color: #004d99; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
    button:disabled { background-color: #a6c8e6; cursor: not-allowed; }
    .loading { text-align: center; color: #666; margin-top: 50px; font-size: 18px; }
  </style>
</head>
<body>

<div id="app">
  <div v-if="isLoading" class="loading">系統載入中，請稍後...</div>
  
  <div v-else class="container">
    <h2>CleanChain 2026 TFBO<br>活動表單</h2>
    
    <form @submit.prevent="submitForm">
      <div class="form-group">
        <label>姓名：</label>
        <input type="text" v-model="form.name" required placeholder="請輸入姓名">
      </div>
      
      <div class="form-group">
        <label>手機：</label>
        <input type="tel" v-model="form.phone" required placeholder="請輸入手機號碼">
      </div>

      <div class="form-group">
        <label>City (城市)：</label>
        <input type="text" v-model="form.city" required placeholder="請輸入城市">
      </div>

      <div class="form-group">
        <label>您的年齡區間為：</label>
        <div class="radio-group">
          <label v-for="option in ['20–29歲', '30–39歲', '40–49歲', '50–59歲', '60歲以上']" :key="option">
            <input type="radio" v-model="form.age" :value="option" required> {{ option }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>您從哪裡得知CleanChain?</label>
        <div class="radio-group">
          <label v-for="option in ['Facebook', 'Instagram', 'Line', '業務推薦', '朋友推薦', '其他']" :key="option">
            <input type="radio" v-model="form.source" :value="option" required> {{ option }}
          </label>
          <input v-if="form.source === '其他'" type="text" v-model="form.sourceOther" class="other-input" placeholder="請註明得知管道" required>
        </div>
      </div>

      <div class="form-group">
        <label>您是否有開過洗衣店、有自己的店面?</label>
        <div class="radio-group">
          <label v-for="option in ['有開過洗衣店，有自己的店面', '有開過洗衣店，沒有自己的店面', '沒開過洗衣店，有自己的店面', '沒開過洗衣店，沒有自己的店面']" :key="option">
            <input type="radio" v-model="form.experience" :value="option" required> {{ option }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>您在評估開店時，最在意的因素是？（可複選）</label>
        <div class="checkbox-group">
          <label v-for="option in ['初期創業成本', '回本時間長短', '展店與營運難易度', '設備維修與保固成本', '總部支援與行銷協助', '其他']" :key="option">
            <input type="checkbox" v-model="form.concerns" :value="option"> {{ option }}
          </label>
          <input v-if="form.concerns.includes('其他')" type="text" v-model="form.concernsOther" class="other-input" placeholder="請註明其他因素" required>
        </div>
      </div>

      <div class="form-group">
        <label>6/4-6/7 TFBO 預計哪一天來參加? （可複選）</label>
        <div class="checkbox-group">
          <label v-for="option in ['4 June', '5 June', '6 June', '7 June', '不會參加TFBO']" :key="option">
            <input type="checkbox" v-model="form.tfboDate" :value="option"> {{ option }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>TFBO 預計甚麼時候來G4攤位?</label>
        <div class="radio-group">
          <label v-for="option in ['10:00-12:00', '12:00-14:00', '14:00-16:00', '16:00-18:00', '不會參加TFBO']" :key="option">
            <input type="radio" v-model="form.tfboTime" :value="option" required> {{ option }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>想參加哪個活動?</label>
        <div class="radio-group">
          <label v-for="option in ['保證營收計畫', '1元競標活動', '都想參加', '只想了解產品與服務']" :key="option">
            <input type="radio" v-model="form.activity" :value="option" required> {{ option }}
          </label>
        </div>
      </div>

      <div class="footer-note">
        表單填寫完成後，須經業務單位聯繫並完成諮詢流程，確認無誤後，始得正式加入「保證營收計畫」。<br><br>
        *本問卷僅作為CleanChain潛在夥伴輪廓分析使用，資料將保密處理。
      </div>

      <button type="submit" :disabled="isSubmitting || form.concerns.length === 0 || form.tfboDate.length === 0">
        {{ isSubmitting ? '資料傳送中...' : '確認送出表單' }}
      </button>
    </form>
  </div>
</div>

<script>
  const { createApp, ref, onMounted } = Vue;

  createApp({
    setup() {
      const isLoading = ref(true);
      const isSubmitting = ref(false);
      const userId = ref('');
      const lineName = ref('');
      
      const form = ref({
        name: '', phone: '', city: '', age: '', source: '', sourceOther: '',
        experience: '', concerns: [], concernsOther: '', tfboDate: [], tfboTime: '', activity: ''
      });

      const MY_LIFF_ID = "2009803488-gHtMXHzf";
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxZOmfFXVpA7djNwjETI3DaRjA3tz9D7eHgectFcx_9Totc_WAnLJUm44oIScg-xrr0/exec";

      onMounted(async () => {
        try {
          await liff.init({ liffId: MY_LIFF_ID });
          if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            userId.value = profile.userId;
            lineName.value = profile.displayName; // 自動抓取 LINE 顯示名稱
            isLoading.value = false;
          } else {
            liff.login();
          }
        } catch (err) {
          console.error("LIFF 初始化失敗", err);
          alert("請在 LINE App 內開啟此連結");
        }
      });

      const submitForm = async () => {
        isSubmitting.value = true;
        
        let finalSource = form.value.source === '其他' ? `其他: ${form.value.sourceOther}` : form.value.source;
        let finalConcerns = [...form.value.concerns];
        if (finalConcerns.includes('其他')) {
          const index = finalConcerns.indexOf('其他');
          finalConcerns[index] = `其他: ${form.value.concernsOther}`;
        }

        const payload = {
          userId: userId.value,
          lineName: lineName.value, // 傳送自動抓取的 LINE 名稱
          name: form.value.name,
          phone: form.value.phone,
          city: form.value.city,
          age: form.value.age,
          source: finalSource,
          experience: form.value.experience,
          concerns: finalConcerns.join('、'),
          tfboDate: form.value.tfboDate.join('、'),
          tfboTime: form.value.tfboTime,
          activity: form.value.activity
        };

        try {
          await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (liff.isInClient()) {
            const shortCode = userId.value.slice(-4);
            try {
              await liff.sendMessages([
                {
                  type: 'text',
                  text: `我已填妥 CleanChain 2026 TFBO 活動表單！\n我的查詢編號是：${shortCode}`
                }
              ]);
            } catch (err) {
              console.log("不支援自動發話環境", err);
              alert("表單已成功送出！"); 
            }
            liff.closeWindow(); 
          } else {
            alert("問卷已成功送出！");
          }
        } catch (error) {
          console.error("送出失敗", error);
          alert("傳送失敗，請確認網路連線。");
        } finally {
          isSubmitting.value = false;
        }
      };

      return { isLoading, isSubmitting, form, submitForm };
    }
  }).mount('#app');
</script>
</body>
</html>
